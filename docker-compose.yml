version: "3.9"

# ══════════════════════════════════════════════════════════════
#  YellowKode Chat — Free Local AI Chat
#  100% local · zero API costs · sessions saved
#
#  Services:
#   • postgres    — session persistence
#   • ollama      — Gemma 4 local inference
#   • model-init  — auto-pull model + embedding model on first run
#   • qdrant      — vector DB for RAG (optional, toggle in Settings)
#   • rag-api     — document ingestion + semantic search
#   • chat-ui     — multimodal chat + session history + RAG settings
#   • open-webui  — alternative full-featured UI (optional)
#
#  Open Source — YellowKode (https://yellowkode.com) + Wunka Tech (https://wunka.tech)
# ══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL — session persistence ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ykchat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yk_chat
      POSTGRES_USER: yk_chat
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yk_chat_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yk_chat"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ykchat_net

  # ── Ollama — Local LLM inference ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ykchat_ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_FLASH_ATTENTION=1
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ykchat_net

  # ── Model Init — pull chat + embedding models on first run ─
  model-init:
    image: ollama/ollama:latest
    container_name: ykchat_model_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - GEMMA_MODEL=${GEMMA_MODEL:-gemma4:e4b}
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["sh", "-c", "echo '⬇ Pulling '$$GEMMA_MODEL && ollama pull $$GEMMA_MODEL && echo '⬇ Pulling nomic-embed-text (RAG embedding model)' && ollama pull nomic-embed-text && echo '✅ All models ready!'"]
    networks:
      - ykchat_net

  # ── Qdrant — Vector DB for RAG ────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ykchat_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 5s
    networks:
      - ykchat_net

  # ── RAG API — document ingestion + semantic search ─────────
  rag-api:
    build:
      context: ./rag-api
      dockerfile: Dockerfile
    container_name: ykchat_rag_api
    restart: unless-stopped
    environment:
      - OLLAMA_API_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - PORT=3002
    volumes:
      - rag_data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3002/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ykchat_net

  # ── Chat UI — multimodal chat + RAG settings ───────────────
  chat-ui:
    build:
      context: ./chat-ui
      dockerfile: Dockerfile
    container_name: ykchat_ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:80"
    environment:
      - GEMMA_MODEL=${GEMMA_MODEL:-gemma4:e4b}
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rag-api:
        condition: service_healthy
    networks:
      - ykchat_net

  # ── Open WebUI — alternative full-featured UI (optional) ───
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ykchat_openwebui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-8080}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-in-production}
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ykchat_net

volumes:
  postgres_data:
  ollama_data:
  qdrant_data:
  rag_data:
  open_webui_data:

networks:
  ykchat_net:
    driver: bridge
